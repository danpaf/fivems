# SolarProject Server Configuration
# ===================================

# Server name (shown in console)
sv_hostname "SolarProject Server"

# Maximum clients (2 for basic testing)
sv_maxclients 4

# LAN mode - no authentication required
sv_lan true

# Game name
set gamename "gta5"

# OneSync - server-authoritative entity sync
set onesync on

# Network endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# No master server listing
sv_master1 ""
sv_master2 ""
sv_master3 ""

# Game build (match your GTA V version)
# Common builds: 3095, 3258, 3323, 3407, 3570, 3751
sv_enforceGameBuild 3095
